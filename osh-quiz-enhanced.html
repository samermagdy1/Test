<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اختبار السلامة والصحة المهنية</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1a3a5c;
    --accent: #f0a500;
    --accent2: #00c9a7;
    --danger: #e74c3c;
    --success: #27ae60;
    --bg: #0d1b2a;
    --card: #162032;
    --card2: #1e2d42;
    --text: #e8edf3;
    --muted: #7a8fa6;
    --border: #2a3f57;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Cairo', 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ─── HEADER ─── */
  header {
    background: linear-gradient(135deg, #0d1b2a 0%, #1a3a5c 60%, #0d2840 100%);
    border-bottom: 2px solid var(--accent);
    padding: 18px 20px 14px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }

  header .logo-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 6px;
  }

  header .logo-icon {
    width: 42px; height: 42px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    box-shadow: 0 0 15px rgba(240,165,0,0.4);
  }

  header h1 {
    font-size: 1.25rem;
    font-weight: 900;
    color: #fff;
    line-height: 1.3;
  }

  header p.subtitle {
    font-size: 0.75rem;
    color: var(--accent);
    letter-spacing: 0.5px;
    font-weight: 600;
  }

  /* ─── TOPIC TABS ─── */
  .topic-scroll {
    display: flex;
    overflow-x: auto;
    gap: 8px;
    padding: 12px 16px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    scrollbar-width: none;
  }
  .topic-scroll::-webkit-scrollbar { display: none; }

  .topic-btn {
    white-space: nowrap;
    padding: 7px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--bg);
    color: var(--muted);
    font-family: 'Cairo', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    flex-shrink: 0;
  }

  .topic-btn.active, .topic-btn:hover {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }

  /* ─── MAIN CONTENT ─── */
  main {
    flex: 1;
    padding: 16px;
    max-width: 700px;
    margin: 0 auto;
    width: 100%;
  }

  /* ─── PROGRESS ─── */
  .progress-bar {
    background: var(--card);
    border-radius: 20px;
    height: 8px;
    overflow: hidden;
    margin-bottom: 10px;
    border: 1px solid var(--border);
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 20px;
    transition: width .4s ease;
  }

  .progress-text {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 14px;
  }

  .score-badge {
    background: var(--accent);
    color: #000;
    padding: 3px 10px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 0.78rem;
  }

  /* ─── QUESTION CARD ─── */
  .q-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 20px 18px;
    margin-bottom: 14px;
    animation: fadeSlide .35s ease;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-type {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 8px;
    font-size: 0.68rem;
    font-weight: 700;
    margin-bottom: 10px;
    letter-spacing: 0.3px;
  }

  .q-type.mcq { background: rgba(0,201,167,0.15); color: var(--accent2); }
  .q-type.tf  { background: rgba(240,165,0,0.15); color: var(--accent); }

  .q-topic-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 0.65rem;
    font-weight: 600;
    background: rgba(255,255,255,0.06);
    color: var(--muted);
    margin-right: 6px;
    margin-bottom: 10px;
  }

  .q-text {
    font-size: 0.95rem;
    font-weight: 700;
    line-height: 1.65;
    color: #fff;
    margin-bottom: 16px;
  }

  .q-number {
    color: var(--accent);
    margin-left: 6px;
  }

  /* ─── OPTIONS ─── */
  .options { display: flex; flex-direction: column; gap: 9px; }

  .opt {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 11px 14px;
    border-radius: 11px;
    border: 1.5px solid var(--border);
    background: var(--card2);
    cursor: pointer;
    transition: all .2s;
    font-size: 0.87rem;
    font-weight: 600;
    line-height: 1.4;
    text-align: right;
    position: relative;
    overflow: hidden;
  }

  .opt::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    opacity: 0;
    transition: opacity .2s;
  }

  .opt:hover:not(.locked) { border-color: var(--accent); transform: translateX(-2px); }
  .opt:hover:not(.locked)::before { opacity: 0.05; }

  .opt .opt-letter {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem;
    font-weight: 700;
    flex-shrink: 0;
    transition: all .2s;
  }

  .opt.correct {
    border-color: var(--success);
    background: rgba(39,174,96,0.12);
    animation: pulse-green .4s ease;
  }
  .opt.correct .opt-letter { background: var(--success); color: #fff; }

  .opt.wrong {
    border-color: var(--danger);
    background: rgba(231,76,60,0.12);
    animation: shake .35s ease;
  }
  .opt.wrong .opt-letter { background: var(--danger); color: #fff; }

  .opt.locked { cursor: default; }

  @keyframes pulse-green {
    0%,100% { transform: scale(1); }
    50%      { transform: scale(1.02); }
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%     { transform: translateX(-6px); }
    40%     { transform: translateX(6px); }
    60%     { transform: translateX(-4px); }
    80%     { transform: translateX(4px); }
  }

  /* ─── FEEDBACK ─── */
  .feedback {
    margin-top: 14px;
    padding: 11px 14px;
    border-radius: 10px;
    font-size: 0.82rem;
    font-weight: 600;
    line-height: 1.5;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.correct { background: rgba(39,174,96,0.12); border: 1px solid var(--success); color: #5ddc8e; }
  .feedback.wrong   { background: rgba(231,76,60,0.10); border: 1px solid var(--danger);  color: #f08080; }

  /* ─── NAV BUTTONS ─── */
  .nav-row {
    display: flex;
    gap: 10px;
    margin-top: 8px;
    margin-bottom: 20px;
  }

  .btn {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: none;
    font-family: 'Cairo', sans-serif;
    font-size: 0.88rem;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
  }

  .btn-next { background: var(--accent); color: #000; }
  .btn-next:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-prev { background: var(--card2); color: var(--text); border: 1.5px solid var(--border); }
  .btn-prev:hover { border-color: var(--muted); }
  .btn-reset { background: rgba(231,76,60,0.2); color: #f08080; border: 1.5px solid rgba(231,76,60,0.3); }
  .btn-reset:hover { background: rgba(231,76,60,0.3); }

  /* ─── RESULTS ─── */
  .results-card {
    background: var(--card);
    border: 2px solid var(--accent);
    border-radius: 20px;
    padding: 28px 20px;
    text-align: center;
    margin-top: 16px;
    display: none;
  }

  .results-card.show { display: block; animation: fadeSlide .4s ease; }

  .results-emoji { font-size: 3rem; margin-bottom: 12px; }
  .results-title { font-size: 1.4rem; font-weight: 900; color: #fff; margin-bottom: 6px; }
  .results-score {
    font-size: 3rem; font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin: 10px 0;
  }
  .results-sub { color: var(--muted); font-size: 0.85rem; margin-bottom: 20px; }

  .stats-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 22px;
  }

  .stat-item {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 18px;
    min-width: 80px;
  }
  .stat-num { font-size: 1.5rem; font-weight: 900; }
  .stat-lbl { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }
  .stat-num.green { color: var(--success); }
  .stat-num.red   { color: var(--danger); }

  /* ─── FOOTER ─── */
  footer {
    background: var(--card);
    border-top: 1px solid var(--border);
    padding: 14px 20px;
    text-align: center;
  }

  .footer-inner {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .footer-text {
    font-size: 0.75rem;
    color: var(--muted);
  }

  .footer-text strong { color: var(--accent); }

  .contact-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 8px 16px;
    background: linear-gradient(135deg, var(--accent), #e69500);
    color: #000;
    border-radius: 20px;
    text-decoration: none;
    font-family: 'Cairo', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    transition: all .2s;
    animation: pulse-btn 2s infinite;
  }

  .contact-btn:hover { transform: scale(1.05); filter: brightness(1.1); animation: none; }

  @keyframes pulse-btn {
    0%,100% { box-shadow: 0 0 0 0 rgba(240,165,0,0.5); }
    50%      { box-shadow: 0 0 0 8px rgba(240,165,0,0); }
  }

  .contact-icon { font-size: 1rem; animation: bounce 1.5s infinite; }
  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-3px); }
  }

  /* ─── EMPTY STATE ─── */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 0.9rem;
  }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (min-width: 600px) {
    main { padding: 20px; }
    header h1 { font-size: 1.5rem; }
    .q-text { font-size: 1rem; }
  }
</style>
</head>

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let currentQuestions = [];
let currentIndex = 0;
let score = 0;
let answered = {};
let activeTopic = "الكل";

const topics = ["الكل", ...new Set(allQuestions.map(q=>q.topic))];

function shuffle(arr) {
  let a=[...arr];
  for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// ══════════════════════════════════════════════
//  RENDER TOPICS
// ══════════════════════════════════════════════
function renderTopics() {
  const container = document.getElementById("topicTabs");
  container.innerHTML = "";
  topics.forEach(t => {
    const btn = document.createElement("button");
    btn.className = "topic-btn" + (t === activeTopic ? " active" : "");
    btn.textContent = t;
    btn.onclick = () => {
      activeTopic = t;
      resetQuiz();
    };
    container.appendChild(btn);
  });
}

// ══════════════════════════════════════════════
//  RESET / INIT
// ══════════════════════════════════════════════
function resetQuiz() {
  currentIndex = 0;
  score = 0;
  answered = {};

  const pool = activeTopic === "الكل"
    ? allQuestions
    : allQuestions.filter(q => q.topic === activeTopic);

  currentQuestions = shuffle(pool).slice(0, Math.min(pool.length, 15));

  document.getElementById("resultsCard").classList.remove("show");
  renderTopics();
  renderQuestion();
}

// ══════════════════════════════════════════════
//  RENDER QUESTION
// ══════════════════════════════════════════════
function renderQuestion() {
  const area = document.getElementById("quizArea");
  const total = currentQuestions.length;
  const q = currentQuestions[currentIndex];

  // progress
  document.getElementById("qCounter").textContent = `السؤال ${currentIndex+1} من ${total}`;
  document.getElementById("scoreBadge").textContent = `النقاط: ${score}`;
  document.getElementById("progressFill").style.width = ((currentIndex+1)/total*100) + "%";

  if (!q) { showResults(); return; }

  const isAnswered = answered.hasOwnProperty(currentIndex);
  const userAns = answered[currentIndex];

  let optsHTML = "";
  if (q.type === "mcq") {
    const letters = ["أ","ب","ج","د"];
    q.opts.forEach((opt, i) => {
      let cls = "opt" + (isAnswered ? " locked" : "");
      if (isAnswered) {
        if (i === q.ans) cls += " correct";
        else if (i === userAns && i !== q.ans) cls += " wrong";
      }
      optsHTML += `
        <div class="${cls}" onclick="selectAnswer(${i})">
          <span class="opt-letter">${letters[i]}</span>
          <span>${opt}</span>
        </div>`;
    });
  } else {
    // true/false
    const opts = [
      { label: "✓ صحيح", val: true },
      { label: "✗ خطأ",  val: false }
    ];
    opts.forEach((opt, i) => {
      let cls = "opt" + (isAnswered ? " locked" : "");
      if (isAnswered) {
        if (opt.val === q.ans) cls += " correct";
        else if (opt.val === userAns && opt.val !== q.ans) cls += " wrong";
      }
      optsHTML += `
        <div class="${cls}" onclick="selectTF(${opt.val})">
          <span class="opt-letter">${opt.label[0]}</span>
          <span>${opt.label}</span>
        </div>`;
    });
  }

  let feedback = "";
  if (isAnswered) {
    const correct = q.type === "mcq" ? (userAns === q.ans) : (userAns === q.ans);
    if (correct) {
      feedback = `<div class="feedback correct show">✅ إجابة صحيحة! أحسنت.</div>`;
    } else {
      const correctText = q.type === "mcq"
        ? `الإجابة الصحيحة: <strong>${q.opts[q.ans]}</strong>`
        : `الإجابة الصحيحة: <strong>${q.ans ? "صحيح ✓" : "خطأ ✗"}</strong>`;
      feedback = `<div class="feedback wrong show">❌ إجابة خاطئة! ${correctText}</div>`;
    }
  }

  area.innerHTML = `
    <div class="q-card">
      <span class="q-type ${q.type === 'mcq' ? 'mcq' : 'tf'}">${q.type === 'mcq' ? 'اختيار من متعدد' : 'صح / خطأ'}</span>
      <span class="q-topic-tag">${q.topic}</span>
      <p class="q-text"><span class="q-number">${currentIndex+1}.</span> ${q.q}</p>
      <div class="options">${optsHTML}</div>
      ${feedback}
    </div>
    <div class="nav-row">
      <button class="btn btn-prev" onclick="prevQ()" ${currentIndex === 0 ? "disabled style='opacity:.4;cursor:default'" : ""}>◄ السابق</button>
      <button class="btn btn-reset" onclick="resetQuiz()">↺ إعادة</button>
      <button class="btn btn-next" onclick="nextQ()">${currentIndex === total-1 ? "النتائج ✦" : "التالي ►"}</button>
    </div>`;
}

// ══════════════════════════════════════════════
//  ANSWER HANDLERS
// ══════════════════════════════════════════════
function selectAnswer(i) {
  if (answered.hasOwnProperty(currentIndex)) return;
  const q = currentQuestions[currentIndex];
  answered[currentIndex] = i;
  if (i === q.ans) score++;
  renderQuestion();
}

function selectTF(val) {
  if (answered.hasOwnProperty(currentIndex)) return;
  const q = currentQuestions[currentIndex];
  answered[currentIndex] = val;
  if (val === q.ans) score++;
  renderQuestion();
}

function nextQ() {
  if (currentIndex < currentQuestions.length - 1) {
    currentIndex++;
    renderQuestion();
  } else {
    showResults();
  }
}

function prevQ() {
  if (currentIndex > 0) {
    currentIndex--;
    renderQuestion();
  }
}

// ══════════════════════════════════════════════
//  RESULTS
// ══════════════════════════════════════════════
function showResults() {
  document.getElementById("quizArea").innerHTML = "";
  const total = currentQuestions.length;
  const pct = Math.round((score / total) * 100);
  const wrong = total - score;

  let emoji = "🎉", title = "ممتاز! أداء رائع";
  if (pct < 50) { emoji = "📚"; title = "تحتاج إلى مزيد من الدراسة"; }
  else if (pct < 75) { emoji = "💪"; title = "جيد! استمر في التطوير"; }

  const card = document.getElementById("resultsCard");
  card.innerHTML = `
    <div class="results-emoji">${emoji}</div>
    <div class="results-title">${title}</div>
    <div class="results-score">${pct}%</div>
    <div class="results-sub">${score} إجابة صحيحة من ${total} سؤال</div>
    <div class="stats-row">
      <div class="stat-item">
        <div class="stat-num green">${score}</div>
        <div class="stat-lbl">صحيح ✅</div>
      </div>
      <div class="stat-item">
        <div class="stat-num red">${wrong}</div>
        <div class="stat-lbl">خطأ ❌</div>
      </div>
      <div class="stat-item">
        <div class="stat-num">${total}</div>
        <div class="stat-lbl">إجمالي الأسئلة</div>
      </div>
    </div>
    <button class="btn btn-next" style="max-width:220px;margin:0 auto;display:block" onclick="resetQuiz()">
      ↺ اختبار جديد
    </button>`;
  card.classList.add("show");
  document.getElementById("progressFill").style.width = "100%";
  document.getElementById("qCounter").textContent = `انتهى الاختبار`;
  document.getElementById("scoreBadge").textContent = `${pct}%`;
}

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
resetQuiz();
</script>
