<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>فنجان قهوة</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;600;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --coffee: #3b1f0a;
      --cream: #c8956c;
      --gold: #e8c87a;
      --steam: rgba(220,200,180,0.55);
      --bg1: #0d0705;
      --bg2: #1a0f08;
      --text: #f5e6d0;
    }

    body {
      background: radial-gradient(ellipse at 40% 30%, #1e0e06 0%, #0d0705 70%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cairo', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Grain overlay */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 100; opacity: 0.4;
    }

    .scene {
      position: relative;
      width: 420px;
      height: 520px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── TABLE ── */
    .table {
      position: absolute;
      bottom: 30px;
      width: 380px;
      height: 18px;
      background: linear-gradient(to bottom, #2a1508, #1a0c05);
      border-radius: 6px 6px 0 0;
      box-shadow: 0 6px 30px rgba(0,0,0,0.7);
    }
    .table::before {
      content: '';
      position: absolute;
      top: -1px; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, #6b3a1f55, #c8956c66, #6b3a1f55, transparent);
      border-radius: 6px;
    }

    /* ── SAUCER ── */
    .saucer {
      position: absolute;
      bottom: 46px;
      width: 160px;
      height: 22px;
      background: linear-gradient(to bottom, #c8956c, #9a6640);
      border-radius: 50%;
      box-shadow: 0 4px 18px rgba(0,0,0,0.6), inset 0 2px 4px rgba(255,255,200,0.15);
      transform-origin: center bottom;
      animation: saucerFloat 3s ease-in-out infinite;
    }
    @keyframes saucerFloat {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-6px); }
    }

    /* ── CUP GROUP ── */
    .cup-group {
      position: absolute;
      bottom: 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: cupFloat 3s ease-in-out infinite;
      transform-origin: center bottom;
    }
    @keyframes cupFloat {
      0%,100% { transform: translateY(0) rotate(0deg); }
      50%      { transform: translateY(-6px) rotate(0deg); }
    }

    /* ── STEAM ── */
    .steams {
      display: flex;
      gap: 12px;
      margin-bottom: 8px;
      height: 60px;
      align-items: flex-end;
    }
    .steam-line {
      width: 5px;
      height: 50px;
      border-radius: 50px;
      background: linear-gradient(to top, var(--steam), transparent);
      animation: steamRise 2s ease-in-out infinite;
      opacity: 0;
    }
    .steam-line:nth-child(1) { animation-delay: 0s; }
    .steam-line:nth-child(2) { animation-delay: 0.4s; height: 38px; }
    .steam-line:nth-child(3) { animation-delay: 0.8s; }
    @keyframes steamRise {
      0%   { opacity: 0;   transform: translateY(0) scaleX(1); }
      30%  { opacity: 0.7; transform: translateY(-10px) scaleX(1.3); }
      80%  { opacity: 0.3; transform: translateY(-40px) scaleX(1.7); }
      100% { opacity: 0;   transform: translateY(-55px) scaleX(2); }
    }

    /* ── CUP BODY ── */
    .cup {
      position: relative;
      width: 110px;
      height: 90px;
      background: linear-gradient(135deg, #d4a068 0%, #9a6030 40%, #7a4520 100%);
      border-radius: 8px 8px 28px 28px;
      box-shadow:
        inset 3px 0 8px rgba(255,255,200,0.12),
        inset -3px 0 8px rgba(0,0,0,0.35),
        0 8px 24px rgba(0,0,0,0.6);
      overflow: hidden;
    }
    /* coffee surface inside cup */
    .cup::before {
      content: '';
      position: absolute;
      top: 10px; left: 10px; right: 10px;
      height: 28px;
      background: radial-gradient(ellipse at 50% 40%, #5c2e0a, #2a0f04);
      border-radius: 50%;
      box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    }
    /* shine */
    .cup::after {
      content: '';
      position: absolute;
      top: 6px; left: 10px;
      width: 20px; height: 50px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.18), transparent);
      border-radius: 50%;
      transform: rotate(-15deg);
    }

    /* ── HANDLE ── */
    .handle {
      position: absolute;
      right: -30px;
      top: 18px;
      width: 30px;
      height: 44px;
      border: 8px solid #b07040;
      border-left: none;
      border-radius: 0 22px 22px 0;
      box-shadow: 3px 2px 8px rgba(0,0,0,0.4);
    }

    /* ══════════════════════════════════
       BREAK ANIMATION STATES
    ══════════════════════════════════ */

    /* Phase 1: shake */
    .phase-shake .cup-group {
      animation: cupShake 0.5s ease-in-out 3;
    }
    @keyframes cupShake {
      0%,100% { transform: translateX(0) rotate(0deg); }
      25%      { transform: translateX(-10px) rotate(-4deg); }
      75%      { transform: translateX(10px) rotate(4deg); }
    }
    .phase-shake .steams { display: none; }

    /* Phase 2: tip */
    .phase-tip .cup-group {
      animation: cupTip 0.6s ease-in forwards !important;
    }
    @keyframes cupTip {
      0%   { transform: translateY(-6px) rotate(0deg); }
      100% { transform: translateY(20px) rotate(-95deg) translateX(-20px); }
    }
    .phase-tip .steams { display: none; }

    /* Phase 3: smash — cup hidden, shards visible */
    .phase-smash .cup-group { display: none; }
    .phase-smash .saucer   { display: none; }

    /* ── SHARDS ── */
    .shards {
      display: none;
      position: absolute;
      bottom: 58px;
      left: 50%;
      transform: translateX(-50%);
    }
    .phase-smash .shards { display: block; }

    .shard {
      position: absolute;
      background: linear-gradient(135deg, #c8956c, #7a4520);
      clip-path: polygon(50% 0%, 100% 80%, 0% 100%);
      animation: shardFly 0.8s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
      transform-origin: center bottom;
      box-shadow: 0 3px 8px rgba(0,0,0,0.5);
    }
    .shard:nth-child(1) { width:28px; height:36px; animation-name: shard1; }
    .shard:nth-child(2) { width:22px; height:28px; animation-name: shard2; }
    .shard:nth-child(3) { width:34px; height:40px; animation-name: shard3; }
    .shard:nth-child(4) { width:18px; height:24px; animation-name: shard4; }
    .shard:nth-child(5) { width:26px; height:32px; animation-name: shard5; }
    .shard:nth-child(6) { width:14px; height:18px; animation-name: shard6; }

    @keyframes shard1 { 0%{transform:translate(0,0) rotate(0deg)} 100%{transform:translate(-80px,-30px) rotate(-140deg)} }
    @keyframes shard2 { 0%{transform:translate(0,0) rotate(0deg)} 100%{transform:translate(-40px,-60px) rotate(200deg)} }
    @keyframes shard3 { 0%{transform:translate(0,0) rotate(0deg)} 100%{transform:translate(60px,-45px) rotate(160deg)} }
    @keyframes shard4 { 0%{transform:translate(0,0) rotate(0deg)} 100%{transform:translate(90px,-20px) rotate(-200deg)} }
    @keyframes shard5 { 0%{transform:translate(0,0) rotate(0deg)} 100%{transform:translate(-20px,-80px) rotate(120deg)} }
    @keyframes shard6 { 0%{transform:translate(0,0) rotate(0deg)} 100%{transform:translate(30px,-90px) rotate(-160deg)} }

    /* ── PUDDLE ── */
    .puddle {
      display: none;
      position: absolute;
      bottom: 47px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
    }
    .phase-smash .puddle { display: block; }

    .puddle-main {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 220px;
      height: 28px;
      background: radial-gradient(ellipse at 50% 60%, #3b1505, #1a0803);
      border-radius: 50%;
      box-shadow: 0 4px 20px rgba(59,21,5,0.8);
      animation: puddleExpand 1.2s ease-out forwards;
    }
    @keyframes puddleExpand {
      0%   { transform: translateX(-50%) scaleX(0) scaleY(0); opacity: 0; }
      40%  { opacity: 1; }
      100% { transform: translateX(-50%) scaleX(1) scaleY(1); opacity: 1; }
    }

    /* drip streams */
    .drip {
      position: absolute;
      bottom: 0;
      width: 6px;
      border-radius: 0 0 6px 6px;
      background: linear-gradient(to bottom, #5c2e0a, #2a0f04);
      animation: dripFlow 1s ease-in forwards;
    }
    .drip:nth-child(2) { left: -50px; height: 0; animation-delay: 0.1s; animation-name: drip1; }
    .drip:nth-child(3) { left: -20px; height: 0; animation-delay: 0.2s; animation-name: drip2; }
    .drip:nth-child(4) { left:  10px; height: 0; animation-delay: 0.15s; animation-name: drip3; }
    .drip:nth-child(5) { left:  40px; height: 0; animation-delay: 0.05s; animation-name: drip4; }

    @keyframes drip1 { 0%{height:0;opacity:0.8} 100%{height:60px;opacity:0} }
    @keyframes drip2 { 0%{height:0;opacity:0.9} 100%{height:90px;opacity:0} }
    @keyframes drip3 { 0%{height:0;opacity:0.8} 100%{height:75px;opacity:0} }
    @keyframes drip4 { 0%{height:0;opacity:0.7} 100%{height:50px;opacity:0} }

    /* ── MESSAGE ── */
    .message {
      display: none;
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      width: 360px;
      animation: msgAppear 1.2s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    .phase-smash .message { display: block; }

    @keyframes msgAppear {
      0%   { opacity: 0; transform: translateX(-50%) translateY(30px) scale(0.85); }
      100% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
    }

    .msg-icon { font-size: 3rem; margin-bottom: 8px; display: block; animation: iconBounce 1s ease-out 0.5s both; }
    @keyframes iconBounce {
      0%   { transform: scale(0) rotate(-20deg); }
      60%  { transform: scale(1.3) rotate(5deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    .msg-title {
      font-family: 'Amiri', serif;
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--gold);
      text-shadow: 0 0 30px rgba(232,200,122,0.6), 0 2px 4px rgba(0,0,0,0.8);
      line-height: 1.3;
      animation: titleGlow 2s ease-in-out 1s infinite alternate;
    }
    @keyframes titleGlow {
      from { text-shadow: 0 0 20px rgba(232,200,122,0.4); }
      to   { text-shadow: 0 0 50px rgba(232,200,122,0.9), 0 0 80px rgba(232,200,122,0.3); }
    }

    .msg-sub {
      font-family: 'Cairo', sans-serif;
      font-weight: 300;
      font-size: 1rem;
      color: rgba(245,230,208,0.7);
      margin-top: 10px;
      letter-spacing: 0.05em;
      animation: fadeInUp 0.8s ease-out 1.4s both;
    }
    @keyframes fadeInUp {
      0%   { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* divider line */
    .msg-line {
      width: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 14px auto;
      animation: lineExpand 0.9s ease-out 1.2s forwards;
    }
    @keyframes lineExpand {
      to { width: 200px; }
    }

    /* floating particles */
    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
    }
    .phase-smash .particle { animation: particleFly 2s ease-out forwards; }
    .particle:nth-child(1)  { width:6px;  height:6px;  top:50%; left:48%; background:#e8c87a; animation-delay:0.1s; --dx:-120px; --dy:-100px; }
    .particle:nth-child(2)  { width:4px;  height:4px;  top:50%; left:52%; background:#c8956c; animation-delay:0.2s; --dx:100px;  --dy:-80px; }
    .particle:nth-child(3)  { width:8px;  height:8px;  top:50%; left:50%; background:#5c2e0a; animation-delay:0.05s;--dx:-60px;  --dy:-120px;}
    .particle:nth-child(4)  { width:5px;  height:5px;  top:50%; left:50%; background:#e8c87a; animation-delay:0.3s; --dx:80px;   --dy:-130px;}
    .particle:nth-child(5)  { width:3px;  height:3px;  top:50%; left:50%; background:#fff;    animation-delay:0.15s;--dx:-90px;  --dy:-60px; }
    .particle:nth-child(6)  { width:7px;  height:7px;  top:50%; left:50%; background:#c8956c; animation-delay:0.25s;--dx:50px;   --dy:-110px;}

    @keyframes particleFly {
      0%   { opacity: 1; transform: translate(0,0) scale(1); }
      80%  { opacity: 0.6; }
      100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0); }
    }

    /* replay button */
    .replay-btn {
      display: none;
      position: absolute;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      background: transparent;
      border: 1px solid rgba(232,200,122,0.4);
      color: rgba(232,200,122,0.7);
      font-family: 'Cairo', sans-serif;
      font-size: 0.8rem;
      padding: 6px 20px;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: all 0.3s;
      animation: fadeInUp 0.6s ease-out 2.5s both;
    }
    .phase-smash .replay-btn { display: block; }
    .replay-btn:hover {
      background: rgba(232,200,122,0.1);
      border-color: var(--gold);
      color: var(--gold);
      box-shadow: 0 0 20px rgba(232,200,122,0.3);
    }

    /* ambient glow */
    .glow {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 300px; height: 300px;
      background: radial-gradient(ellipse, rgba(59,21,5,0.4) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      animation: glowPulse 3s ease-in-out infinite;
    }
    @keyframes glowPulse {
      0%,100% { transform: translate(-50%,-50%) scale(1); opacity: 0.6; }
      50%      { transform: translate(-50%,-50%) scale(1.2); opacity: 1; }
    }
  </style>
</head>
<body>

<div class="scene" id="scene">
  <div class="glow"></div>

  <!-- Particles -->
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>

  <!-- Message -->
  <div class="message">
    <span class="msg-icon">☕</span>
    <div class="msg-title">كله رايح</div>
    <div class="msg-line"></div>
    <div class="msg-sub">حتى الفنجان المكسور... يترك أثراً</div>
  </div>

  <!-- Cup group -->
  <div class="cup-group" id="cupGroup">
    <div class="steams">
      <div class="steam-line"></div>
      <div class="steam-line"></div>
      <div class="steam-line"></div>
    </div>
    <div class="cup">
      <div class="handle"></div>
    </div>
  </div>

  <!-- Saucer -->
  <div class="saucer" id="saucer"></div>

  <!-- Shards -->
  <div class="shards">
    <div class="shard"></div>
    <div class="shard"></div>
    <div class="shard"></div>
    <div class="shard"></div>
    <div class="shard"></div>
    <div class="shard"></div>
  </div>

  <!-- Coffee puddle and drips -->
  <div class="puddle">
    <div class="drip"></div>
    <div class="drip"></div>
    <div class="drip"></div>
    <div class="drip"></div>
    <div class="puddle-main"></div>
  </div>

  <!-- Table -->
  <div class="table"></div>

  <!-- Replay -->
  <button class="replay-btn" onclick="replay()">▶ إعادة</button>
</div>

<script>
  const scene = document.getElementById('scene');

  function setPhase(phase) {
    scene.className = 'scene ' + (phase ? 'phase-' + phase : '');
  }

  function replay() {
    setPhase('');
    setTimeout(startAnimation, 100);
  }

  function startAnimation() {
    setPhase('');

    // Phase 0: float (default) — 2s
    setTimeout(() => setPhase('shake'), 2000);

    // Phase 1: shake — 1.5s
    setTimeout(() => setPhase('tip'), 3500);

    // Phase 2: tip — 0.6s
    setTimeout(() => {
      setPhase('smash');
    }, 4200);
  }

  startAnimation();
</script>
</body>
</html>
