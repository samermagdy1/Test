
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 Not Found</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .code {
      font-size: clamp(140px, 30vw, 220px);
      font-weight: 900;
      color: #555;
      line-height: 1;
      letter-spacing: -4px;
    }

    .title {
      font-size: clamp(22px, 5vw, 32px);
      font-weight: 700;
      color: #ccc;
      letter-spacing: 1px;
    }

    .desc {
      font-size: clamp(13px, 2.5vw, 16px);
      color: #555;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <div class="title">Not Found</div>
    <div class="desc">The resource requested could not be found on this server!</div>
  </div>
</body>
</html>
